<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HORARIO INGENIERIA INFORMATICA</title>
<style>
  :root{
    --hour-bg:#EAEAEA;
    --border:#8c8c8c;
    --page-bg:#f3f4f6;
  }
  /* Per-subject colors are no longer hardcoded here. Each element that
     belongs to a subject (legend swatch, header label, grid block) gets
     --bg and --glow set inline via JS (see applySubjectColor()), and the
     rules below just consume those custom properties generically. */
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI', Arial, sans-serif;
    background:var(--page-bg);
    padding:24px 12px 60px;
    color:#1a1a1a;
  }
  h1{
    text-align:center;
    font-size:20px;
    letter-spacing:.5px;
    margin:0 0 4px;
  }
  .subtitle{
    text-align:center;
    color:#666;
    font-size:13px;
    margin-bottom:18px;
  }
  .wrap{
    max-width:1300px;
    margin:0 auto;
    overflow-x:auto;
    background:#fff;
    border-radius:8px;
    box-shadow:0 1px 4px rgba(0,0,0,.12);
    padding:14px;
  }
  table{
    border-collapse:collapse;
    table-layout:auto;
  }
  th,td{
    border:1px solid var(--border);
    text-align:center;
    font-size:12.5px;
    padding:2px;
    vertical-align:middle;
    white-space:nowrap;
    min-width:90px;
  }
  td.hour, th.hourhead{
    min-width:64px;
  }
  col.hourcol{width:64px;}
  th.daylabel{
    font-size:13px;
    font-weight:700;
    background:#fff;
    padding:5px 2px;
    letter-spacing:.5px;
  }
  th.subjectlabel{
    font-weight:700;
    padding:5px 2px;
    font-size:12px;
  }
  td.hour{
    background:var(--hour-bg);
    font-weight:600;
    font-size:12px;
    color:#333;
  }
  td.empty{
    background:#fafafa;
  }
  /* th.subjectlabel (column header) and .legend td.tag both carry a
     data-subject attribute and an inline --bg custom property (set by JS),
     so a single rule colors both, whatever the subject. */
  th.subjectlabel[data-subject],
  .legend td.tag[data-subject]{
    background:var(--bg);
  }

  /* blocks in the grid start out neutral gray; color only appears once selected */
  td.block{
    background:#d6d6d6;
    cursor:pointer;
    position:relative;
    font-weight:600;
    line-height:1.35;
    padding:6px 4px;
    transition:filter .25s ease, transform .1s ease, opacity .25s ease;
  }
  td.block:hover{
    filter:brightness(0.94);
  }
  td.block:active{
    transform:scale(0.98);
  }
  table.has-selection td.block:not(.selected){
    filter: grayscale(55%) brightness(0.8);
    opacity:.55;
  }
  table.has-selection td.block:not(.selected):hover{
    filter: grayscale(35%) brightness(0.88);
    opacity:.8;
  }
  td.block .line1{font-weight:700; font-size:12.5px;}
  td.block .line2, td.block .line3{font-weight:500; font-size:11px; color:#333;}

  /* neon chasing-light border for selected blocks */
  td.block{
    --glow: #888;
  }
  /* --bg / --glow come from the inline style JS sets on each td.block
     (see applySubjectColor()), so this single rule covers every subject. */
  td.block.selected{
    z-index:2;
    background-color:var(--bg, #d6d6d6);
    background-image: radial-gradient(ellipse at center, color-mix(in srgb, var(--glow) 55%, white) 0%, transparent 75%);
    background-blend-mode: screen;
    animation: glow-pulse 2.4s ease-in-out infinite;
    box-shadow: inset 0 0 10px color-mix(in srgb, var(--glow) 55%, transparent);
  }
  @keyframes glow-pulse{
    0%, 100%{ filter: brightness(1) saturate(1); }
    50%{ filter: brightness(1.18) saturate(1.35); }
  }

  svg.neon{
    position:absolute;
    inset:-4px;
    width:calc(100% + 8px);
    height:calc(100% + 8px);
    pointer-events:none;
    opacity:0;
    transition:opacity .3s ease;
  }
  td.block.selected svg.neon{
    opacity:1;
  }
  svg.neon .ambient{
    fill:none;
    stroke:var(--glow);
    stroke-width:2.5;
    opacity:.45;
    filter: drop-shadow(0 0 2px var(--glow));
  }
  svg.neon .comet{
    fill:none;
    stroke:var(--glow);
    stroke-width:3;
    stroke-linecap:round;
    stroke-dasharray:16 84;
    filter: drop-shadow(0 0 2px var(--glow)) drop-shadow(0 0 6px var(--glow)) drop-shadow(0 0 10px var(--glow));
    animation: chase 2.4s linear infinite;
  }
  @keyframes chase{
    from{ stroke-dashoffset:0; }
    to{ stroke-dashoffset:-100; }
  }

  .legend{
    max-width:1300px;
    margin:22px auto 0;
    background:#fff;
    border-radius:8px;
    box-shadow:0 1px 4px rgba(0,0,0,.12);
    padding:14px 18px;
  }
  .legend table{min-width:0;}
  .legend td{
    border:1px solid var(--border);
    font-size:13px;
    padding:6px 10px;
  }
  .legend td.tag{
    font-weight:700;
    width:130px;
  }
  /* both the legend swatch and the column header act as color pickers */
  .legend td.tag[data-subject],
  th.subjectlabel[data-subject]{
    cursor:pointer;
    transition:filter .15s ease;
  }
  .legend td.tag[data-subject]:hover,
  th.subjectlabel[data-subject]:hover{
    filter:brightness(1.08);
  }

  /* self-built color palette popover: doesn't rely on the OS/browser native
     color dialog (which sandboxed previews can silently block), so picking
     a color always works. Shared by the legend and the column headers. */
  .color-popover{
    position:fixed;
    z-index:1000;
    background:#fff;
    border:1px solid var(--border);
    border-radius:8px;
    box-shadow:0 6px 20px rgba(0,0,0,.22);
    padding:12px;
    display:none;
  }
  .color-popover.open{ display:block; }
  .color-popover .swatch-grid{
    display:grid;
    grid-template-columns:repeat(6, 26px);
    gap:7px;
    margin-bottom:10px;
  }
  .color-popover .swatch-btn{
    width:26px;
    height:26px;
    border-radius:50%;
    border:2px solid #fff;
    outline:1px solid var(--border);
    cursor:pointer;
    padding:0;
  }
  .color-popover .swatch-btn:hover{
    transform:scale(1.1);
  }
  .color-popover .swatch-btn.active{
    outline:2px solid #1a1a1a;
  }
  .color-popover .custom-row{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    color:#444;
    white-space:nowrap;
  }
  .color-popover input[type="color"]{
    width:34px;
    height:26px;
    padding:0;
    border:1px solid var(--border);
    border-radius:4px;
    cursor:pointer;
    background:none;
  }
  .toolbar{
    max-width:1300px;
    margin:0 auto 14px;
    display:flex;
    justify-content:space-between; /* Cambiado para separar los lados */
    align-items:center;
    gap:10px;
  }
  .toolbar-right {
    display:flex;
    align-items:center;
    gap:10px;
  }
  .toolbar button{
    border:1px solid var(--border);
    background:#fff;
    padding:7px 14px;
    border-radius:6px;
    font-size:12.5px;
    cursor:pointer;
    color:#333;
    font-weight: 600;
  }
  .toolbar button:hover{background:#f0f0f0;}
  .status{
    font-size:11.5px;
    color:#888;
    text-align:center;
    margin-top:8px;
  }

  /* right-click marking: black background + white text, combined with selection */
  td.block.marked{
    background-color:#000 !important;
    background-image:none !important;
  }
  td.block.marked .line1,
  td.block.marked .line2,
  td.block.marked .line3{
    color:#fff !important;
  }
  .day-border-right{
    border-right:2px solid #000 !important;
  }

  /* ---- animation on/off slider switch ---- */
  .switch-wrap{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12.5px;
    color:#444;
    cursor:pointer;
    user-select:none;
  }
  .switch{ position:relative; display:inline-block; }
  .switch input{
    position:absolute;
    opacity:0;
    width:100%;
    height:100%;
    margin:0;
    cursor:pointer;
  }
  .switch-track{
    display:block;
    width:40px;
    height:22px;
    background:#c9c9c9;
    border-radius:999px;
    position:relative;
    transition:background .2s ease;
  }
  .switch-thumb{
    position:absolute;
    top:2px;
    left:2px;
    width:18px;
    height:18px;
    border-radius:50%;
    background:#fff;
    box-shadow:0 1px 3px rgba(0,0,0,.3);
    transition:transform .2s ease;
  }
  .switch input:checked + .switch-track{
    background:#4CAF50;
  }
  .switch input:checked + .switch-track .switch-thumb{
    transform:translateX(18px);
  }

  /* ---- static mode: no animations, no border, solid color instead ---- */
  table.no-anim td.block.selected{
    animation:none;
    filter:brightness(1) saturate(1);
    box-shadow:none;
  }
  table.no-anim svg.neon{
    display:none;
  }

  /* ---- Modo "Ajustar al ancho" (Forzado) ---- */
  table.fit-width-mode {
    width: 100%;
    table-layout: fixed; /* Fuerza a las columnas a compartir el espacio disponible */
  }
  table.fit-width-mode th, 
  table.fit-width-mode td {
    min-width: 0 !important; /* Anula el mínimo de 90px */
    white-space: normal !important; /* Permite que el texto baje a la siguiente línea */
    word-break: break-word; /* Rompe palabras largas si es necesario */
    font-size: 10.5px; /* Letra un poco más pequeña para que quepa mejor */
    padding: 2px 1px;
  }
  table.fit-width-mode td.block .line1 { font-size: 11px; }
  table.fit-width-mode td.block .line2, 
  table.fit-width-mode td.block .line3 { font-size: 9.5px; }

</style>
</head>
<body>

<h1>HORARIO</h1>
<div class="subtitle">Haz click izquierdo sobre una clase para marcarla. Click derecho para marcarla como obligatoria. Tu selección se guarda automáticamente.</div>

<div class="toolbar">
  <!-- Nuevo botón de inicio -->
  <button id="homeBtn" onclick="window.location.href='index.html'">⬅ Volver al Inicio</button>
  
  <div class="toolbar-right">
    <label class="switch-wrap">
      <span class="switch-label">Animación</span>
      <span class="switch">
        <input type="checkbox" id="animToggle" checked>
        <span class="switch-track"><span class="switch-thumb"></span></span>
      </span>
    </label>
    <button id="clearBtn">Borrar selección</button>
  </div>

  <!-- Ajustar ancho -->
  <button id="fitWidthBtn">Restaurar ancho</button>
</div>

<div class="wrap">
  <table id="schedule" class="fit-width-mode">
    <colgroup id="colGroup">
      <col class="hourcol">
    </colgroup>
    <thead>
      <tr id="dayRow">
        <th class="hourhead"></th>
      </tr>
      <tr id="subjectRow">
        <th class="hourhead">HORA</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="legend">
  <table id="legendTable"></table>
</div>

<div class="status" id="statusMsg">Cargando selección guardada...</div>

<script>
// ---- time axis (30 min slots, 8:30 -> 21:30, lunch break 14:00-15:30 hidden as in original sheet) ----
const times = [
  "8:30","9:00","9:30","10:00","10:30","11:00","11:30","12:00","12:30","13:00","13:30","14:00",     "14:30","15:00", 
  "15:30","16:00","16:30","17:00","17:30","18:00","18:30","19:00","19:30","20:00","20:30","21:00"
];

function idx(t){ return times.indexOf(t); }


const savedData = localStorage.getItem('custom_schedule_data');

let SCHEDULE_DATA = {
  days: [
    { key: "lunes", label: "LUNES" },
    { key: "martes", label: "MARTES" },
    { key: "miercoles", label: "MIÉRCOLES" },
    { key: "jueves", label: "JUEVES" },
    { key: "viernes", label: "VIERNES" }
  ],
  subject: [] // Vacío por defecto
};

if (savedData) {
  try {
    SCHEDULE_DATA = JSON.parse(savedData);
    console.log("Horario cargado exitosamente desde localStorage");
  } catch (error) {
    console.error("Error al leer los datos guardados:", error);
  }
} else {
  // Si no hay datos (alguien entró directo a horario.html sin pasar por el selector)
  alert("No tienes asignaturas seleccionadas. Redirigiendo al selector...");
  window.location.href = 'selector.html'; // Lo mandamos de vuelta
}

// A partir de aquí, el resto de tu código de horario.html funciona normal
// usando la variable SCHEDULE_DATA que acabamos de cargar.
// const { cols: columns, dayEndKeys: DAY_END_KEYS... } = buildColumns(SCHEDULE_DATA);

// day full-name -> short key prefix used internally (kept the same as before
// so previously saved selections still line up). Derived automatically from
// each day's "key" in the JSON (first 3 letters), not hardcoded.
function dayPrefix(dayKey){ return dayKey.slice(0,3); }

// ---------------------------------------------------------------------
// Per-subject colors: random-but-distinct by default, editable by clicking
// either the legend swatch or the column header (both reuse the exact same
// functions below), and persisted so they survive a page reload.
// ---------------------------------------------------------------------
const COLORS_KEY = 'horario:subject-colors';
let subjectColors = {}; // { SORT_NAME: '#rrggbb' }

function hslToHex(h, s, l){
  s/=100; l/=100;
  const k = n => (n + h/30) % 12;
  const a = s * Math.min(l, 1-l);
  const f = n => l - a*Math.max(-1, Math.min(k(n)-3, Math.min(9-k(n), 1)));
  const toHex = x => Math.round(255*x).toString(16).padStart(2,'0');
  return `#${toHex(f(0))}${toHex(f(8))}${toHex(f(4))}`;
}

// spreads default hues using the golden angle so consecutive subjects
// never land on similar colors, however many subjects the JSON has
function defaultColorFor(index){
  const hue = (index * 137.508) % 360;
  return hslToHex(hue, 62, 55);
}

// loads saved colors from storage and fills in a random default for any
// subject that doesn't have one yet (new subject, or first time ever run)
async function loadSubjectColors(subjectList){
  let saved = {};
  try{
    const raw = await storageGet(COLORS_KEY);
    if(raw) saved = JSON.parse(raw);
  }catch(e){ saved = {}; }
  subjectList.forEach((subj, i)=>{
    subjectColors[subj.sort_name] = saved[subj.sort_name] || defaultColorFor(i);
  });
  await storageSet(COLORS_KEY, JSON.stringify(subjectColors));
}

// applies a subject's current color to every element tied to it (legend
// swatch, column header, grid blocks) - they all just carry a
// data-subject="<SORT_NAME>" attribute, so this works no matter which kind
// of element it is.
function applySubjectColor(sortName){
  const color = subjectColors[sortName];
  if(!color) return;
  document.querySelectorAll(`[data-subject="${CSS.escape(sortName)}"]`).forEach(el=>{
    el.style.setProperty('--bg', color);
    el.style.setProperty('--glow', color);
  });
}

function setSubjectColor(sortName, color){
  subjectColors[sortName] = color;
  applySubjectColor(sortName);
  storageSet(COLORS_KEY, JSON.stringify(subjectColors));
}

// ---------------------------------------------------------------------
// Self-built color popover. A palette of preset swatches plus a "custom"
// color input, rendered as regular page elements (not the OS/browser
// native color dialog, which sandboxed previews can silently refuse to
// open). One shared popover, reused for every subject - opened by
// makeColorPickable() below, called from both the legend and the headers.
// ---------------------------------------------------------------------
const PALETTE_COLORS = [
  '#00BCD4','#8E44AD','#27AE60','#E6A800','#C0392B','#2980B9',
  '#D35400','#16A085','#E91E63','#3F51B5','#F39C12','#009688',
  '#795548','#5D4037','#673AB7','#607D8B','#8BC34A','#FF5722'
];

const colorPopover = document.createElement('div');
colorPopover.className = 'color-popover';
colorPopover.innerHTML = `
  <div class="swatch-grid"></div>
  <label class="custom-row">Personalizado
    <input type="color">
  </label>
`;
document.body.appendChild(colorPopover);

const swatchGrid = colorPopover.querySelector('.swatch-grid');
const customColorInput = colorPopover.querySelector('input[type="color"]');
PALETTE_COLORS.forEach(color=>{
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'swatch-btn';
  btn.style.background = color;
  btn.dataset.color = color;
  swatchGrid.appendChild(btn);
});

let popoverSubject = null;

function openColorPopover(sortName, anchorEl){
  popoverSubject = sortName;
  const current = (subjectColors[sortName] || '#888888').toLowerCase();
  swatchGrid.querySelectorAll('.swatch-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.color.toLowerCase() === current);
  });
  customColorInput.value = /^#([0-9a-f]{6})$/i.test(current) ? current : '#888888';

  const rect = anchorEl.getBoundingClientRect();
  colorPopover.classList.add('open'); // show first so its size can be measured
  const popW = colorPopover.offsetWidth;
  const left = Math.min(Math.max(8, rect.left), window.innerWidth - popW - 8);
  const top = Math.min(rect.bottom + 6, window.innerHeight - colorPopover.offsetHeight - 8);
  colorPopover.style.left = left + 'px';
  colorPopover.style.top = top + 'px';
}

function closeColorPopover(){
  colorPopover.classList.remove('open');
  popoverSubject = null;
}

swatchGrid.addEventListener('click', (e)=>{
  const btn = e.target.closest('.swatch-btn');
  if(!btn || !popoverSubject) return;
  setSubjectColor(popoverSubject, btn.dataset.color);
  closeColorPopover();
});

customColorInput.addEventListener('input', ()=>{
  if(popoverSubject) setSubjectColor(popoverSubject, customColorInput.value);
});

colorPopover.addEventListener('click', (e)=> e.stopPropagation());

document.addEventListener('click', (e)=>{
  if(colorPopover.classList.contains('open') && !e.target.closest('[data-subject]')){
    closeColorPopover();
  }
});

// makes any element (legend <td class="tag">, header <th>) open the shared
// color popover for a given subject on click - reused by both call sites
function makeColorPickable(el, sortName){
  el.dataset.subject = sortName;
  el.title = 'Toca para cambiar el color de esta asignatura';
  el.addEventListener('click', (e)=>{
    e.stopPropagation();
    openColorPopover(sortName, el);
  });
}

function buildColumns(data){
  const cols = [];
  const dayEndKeys = new Set();
  const dayHeaders = []; // { label, colspan, isLastDay }

  const days = data.days;
  days.forEach((dayInfo, dIdx)=>{
    const day = dayInfo.key;
    const prefix = dayPrefix(day);
    const isLastDay = dIdx === days.length - 1;

    // Filtramos las asignaturas que tienen clase este día
    const daySubjects = data.subject.filter(subj => {
      const blocks = subj.horario[day];
      return blocks && blocks.length > 0;
    });

    // --- CORRECCIÓN: Si el día está completamente vacío ---
    if (daySubjects.length === 0) {
      const key = prefix + "-vacio";
      cols.push({
        key: key,
        cls: "cell-empty", // Clase genérica sin color
        label: "-",        // Ponemos un guioncito o lo dejamos en blanco
        blocks: [],
      });
      
      if (!isLastDay) {
        dayEndKeys.add(key);
      }
      
      dayHeaders.push({
        label: dayInfo.label,
        colspan: 1, // Le damos al menos 1 de ancho para que no colapse
        isLastDay,
      });
    } 
    // --- Lógica original si el día SÍ tiene clases ---
    else {
      daySubjects.forEach((subj, i)=>{
        const sortName = subj.sort_name;
        const label = sortName;
        const cls = "cell-" + sortName.toLowerCase();
        const dayBlocks = subj.horario[day];
        const key = prefix + "-" + sortName.toLowerCase();
        
        cols.push({
          key,
          cls,
          label,
          blocks: dayBlocks.map(b => ({
            start: b.start,
            span: b.halfHourSlots,
            lines: [label, ...b.lines],
          })),
        });
        
        if(i === daySubjects.length - 1 && !isLastDay){
          dayEndKeys.add(key);
        }
      });

      dayHeaders.push({
        label: dayInfo.label,
        colspan: daySubjects.length,
        isLastDay,
      });
    }
  });

  return { cols, dayEndKeys, dayHeaders };
}

const { cols: columns, dayEndKeys: DAY_END_KEYS, dayHeaders: DAY_HEADERS } = buildColumns(SCHEDULE_DATA);

// build the colgroup: one <col> per data column, sized from the JSON-derived
// column list (colgroup already has the leading hourcol in the HTML)
const colGroup = document.getElementById('colGroup');
columns.forEach(()=>{
  colGroup.appendChild(document.createElement('col'));
});

// build the day-label header row (LUNES, MARTES, ...) with colspans taken
// directly from how many subjects had blocks that day (computed in
// buildColumns by iterating data.subject per day - see there)
const dayRow = document.getElementById('dayRow');
DAY_HEADERS.forEach(dh=>{
  const th = document.createElement('th');
  th.className = 'daylabel' + (dh.isLastDay ? '' : ' day-border-right');
  th.colSpan = dh.colspan;
  th.textContent = dh.label;
  dayRow.appendChild(th);
});

// build the subject-label header row from the same column data (keeps it in
// sync automatically with the JSON's days/subject data, no hand-written <th>s)
const subjectRow = document.getElementById('subjectRow');
columns.forEach(col=>{
  const th = document.createElement('th');
  th.className = 'subjectlabel ' + col.cls + (DAY_END_KEYS.has(col.key) ? ' day-border-right' : '');
  th.textContent = col.label;
  makeColorPickable(th, col.label); // click header -> change this subject's color
  subjectRow.appendChild(th);
});

// build the legend from the same subject list used everywhere else, so its
// swatches automatically match whatever subjects exist in the JSON
const legendTable = document.getElementById('legendTable');
SCHEDULE_DATA.subject.forEach(subj=>{
  const tr = document.createElement('tr');
  const tagTd = document.createElement('td');
  tagTd.className = 'tag';
  tagTd.textContent = subj.sort_name;
  makeColorPickable(tagTd, subj.sort_name); // click legend swatch -> change color too
  const descTd = document.createElement('td');
  descTd.textContent = subj.name;
  tr.appendChild(tagTd);
  tr.appendChild(descTd);
  legendTable.appendChild(tr);
});

// build per-column per-row map: 'covered' | block-object | null(empty)
const grid = columns.map(col=>{
  const rows = new Array(times.length).fill(null);
  col.blocks.forEach(b=>{
    const s = idx(b.start);
    for(let i=0;i<b.span;i++){
      rows[s+i] = (i===0) ? {block:b, isStart:true} : {isStart:false};
    }
  });
  return rows;
});

const tbody = document.getElementById('tbody');
for(let r=0; r<times.length; r++){
  const tr = document.createElement('tr');
  const hourTd = document.createElement('td');
  hourTd.className='hour';
  hourTd.textContent = times[r];
  tr.appendChild(hourTd);

  columns.forEach((col, ci)=>{
    const cellInfo = grid[ci][r];
    if(cellInfo && !cellInfo.isStart){
      return; // covered by rowspan above, skip
    }
    const td = document.createElement('td');
    const isDayEnd = DAY_END_KEYS.has(col.key);
    if(cellInfo && cellInfo.isStart){
      const b = cellInfo.block;
      td.rowSpan = b.span;
      td.className = 'block ' + col.cls + (isDayEnd ? ' day-border-right' : '');
      td.dataset.key = col.key + '_' + b.start;
      td.dataset.subject = col.label; // links this block to its subject's color
      const lines = b.lines.map((l,i)=>`<div class="line${i+1}">${l}</div>`).join('');
      const neonSvg = `<svg class="neon" viewBox="0 0 100 100" preserveAspectRatio="none">
          <rect class="ambient" x="2" y="2" width="96" height="96" rx="5" ry="5" pathLength="100"></rect>
          <rect class="comet"   x="2" y="2" width="96" height="96" rx="5" ry="5" pathLength="100"></rect>
        </svg>`;
      td.innerHTML = lines + neonSvg;
      td.addEventListener('click', ()=>toggleSelect(td));
      td.addEventListener('contextmenu', (e)=>{
        e.preventDefault();
        toggleMarkAndSelect(td);
      });
    } else {
      td.className = 'empty' + (isDayEnd ? ' day-border-right' : '');
    }
    tr.appendChild(td);
  });
  tbody.appendChild(tr);
}

// ---- persistence: works inside artifacts (window.storage) AND as a
// standalone downloaded HTML file opened directly in a browser (localStorage) ----
const STORAGE_KEY = 'horario:selected-blocks';
const MARKED_KEY = 'horario:marked-blocks';
const ANIM_KEY = 'horario:anim-enabled';
let selectedKeys = new Set();
let markedKeys = new Set();
let animEnabled = true;

const storageAvailable = (typeof window !== 'undefined') && !!window.storage;

async function storageGet(key){
  if(storageAvailable){
    try{
      const res = await window.storage.get(key, false);
      return res ? res.value : null;
    }catch(e){ /* fall through to localStorage */ }
  }
  try{
    return localStorage.getItem(key);
  }catch(e){
    return null;
  }
}

async function storageSet(key, value){
  let ok = false;
  if(storageAvailable){
    try{
      const res = await window.storage.set(key, value, false);
      ok = !!res;
    }catch(e){ /* fall through to localStorage */ }
  }
  try{
    localStorage.setItem(key, value);
    ok = true;
  }catch(e){ /* ignore */ }
  return ok;
}

async function loadSelection(){
  try{
    const raw = await storageGet(STORAGE_KEY);
    if(raw){ selectedKeys = new Set(JSON.parse(raw)); }
  }catch(e){
    selectedKeys = new Set();
  }
  try{
    const rawMarked = await storageGet(MARKED_KEY);
    if(rawMarked){ markedKeys = new Set(JSON.parse(rawMarked)); }
  }catch(e){
    markedKeys = new Set();
  }
  try{
    const rawAnim = await storageGet(ANIM_KEY);
    if(rawAnim !== null){ animEnabled = rawAnim === 'true'; }
  }catch(e){ /* keep default */ }

  applySelection();
  applyMarked();
  applyAnimState();
  document.getElementById('statusMsg').textContent =
    selectedKeys.size ? `${selectedKeys.size} clase(s) marcada(s).` : 'Sin clases marcadas todavía.';
}

async function saveSelection(){
  await storageSet(STORAGE_KEY, JSON.stringify(Array.from(selectedKeys)));
}

async function saveMarked(){
  await storageSet(MARKED_KEY, JSON.stringify(Array.from(markedKeys)));
}

async function saveAnimPref(){
  await storageSet(ANIM_KEY, animEnabled ? 'true' : 'false');
}

function applySelection(){
  document.querySelectorAll('td.block').forEach(td=>{
    if(selectedKeys.has(td.dataset.key)){
      td.classList.add('selected');
    }else{
      td.classList.remove('selected');
    }
  });
  document.getElementById('schedule').classList.toggle('has-selection', selectedKeys.size > 0);
}

function toggleSelect(td){
  const key = td.dataset.key;
  if(selectedKeys.has(key)){
    selectedKeys.delete(key);
  }else{
    selectedKeys.add(key);
  }
  if(markedKeys.has(key)){
    markedKeys.delete(key);
    applyMarked();
    saveMarked();
  }
  applySelection();
  saveSelection();
  document.getElementById('statusMsg').textContent =
    selectedKeys.size ? `${selectedKeys.size} clase(s) marcada(s).` : 'Sin clases marcadas todavía.';
}

function applyMarked(){
  document.querySelectorAll('td.block').forEach(td=>{
    if(markedKeys.has(td.dataset.key)){
      td.classList.add('marked');
    }else{
      td.classList.remove('marked');
    }
  });
}

function toggleMarkAndSelect(td){
  const key = td.dataset.key;
  const active = markedKeys.has(key);
  if(active){
    markedKeys.delete(key);
    selectedKeys.delete(key);
  }else{
    markedKeys.add(key);
    selectedKeys.add(key);
  }
  applyMarked();
  applySelection();
  saveMarked();
  saveSelection();
  document.getElementById('statusMsg').textContent =
    selectedKeys.size ? `${selectedKeys.size} clase(s) marcada(s).` : 'Sin clases marcadas todavía.';
}

function applyAnimState(){
  document.getElementById('schedule').classList.toggle('no-anim', !animEnabled);
  const toggle = document.getElementById('animToggle');
  if(toggle) toggle.checked = animEnabled;
}

// ---- Lógica para alternar el ajuste al ancho ----
const fitWidthBtn = document.getElementById('fitWidthBtn');
const scheduleTable = document.getElementById('schedule');

fitWidthBtn.addEventListener('click', () => {
  scheduleTable.classList.toggle('fit-width-mode');
  
  // Cambia el texto del botón dependiendo del estado
  if (scheduleTable.classList.contains('fit-width-mode')) {
    fitWidthBtn.textContent = 'Restaurar ancho';
  } else {
    fitWidthBtn.textContent = 'Ajustar ancho';
  }
});

document.getElementById('animToggle').addEventListener('change', (e)=>{
  animEnabled = e.target.checked;
  applyAnimState();
  saveAnimPref();
});

document.getElementById('clearBtn').addEventListener('click', ()=>{
  // Vaciamos ambas variables
  selectedKeys.clear();
  markedKeys.clear();

  // Actualizamos visualmente la tabla para ambas cosas
  applySelection();
  applyMarked();

  // Guardamos en la memoria del navegador que ahora están vacías
  saveSelection();
  saveMarked();

  document.getElementById('statusMsg').textContent = 'Sin clases marcadas todavía.';
});

loadSelection();

// load saved subject colors (or generate random defaults) and paint every
// legend swatch / header / block that carries that subject's data-subject
async function initSubjectColors(){
  await loadSubjectColors(SCHEDULE_DATA.subject);
  SCHEDULE_DATA.subject.forEach(s => applySubjectColor(s.sort_name));
}
initSubjectColors();
